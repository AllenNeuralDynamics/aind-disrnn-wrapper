data:
  type: mice_snapshot
  _target_: data_loaders.mice.MiceSnapshotDatasetLoader
  subject_ids: null
  subject_start: 0
  subject_end: 10
  test_subject_ids: null
  test_subject_start: 10
  test_subject_end: 13
  train_example_sessions_per_subject: 1
  eval_example_sessions_per_subject: 1
  heldout_example_sessions_per_subject: 1
  example_max_subjects: 3
  curricula:
  - Uncoupled Without Baiting
  - Uncoupled Baiting
  - Coupled Baiting
  cols_to_retain: null
  mature_only: true
  multisubject: false
  ignore_policy: exclude
  features: null
  eval_every_n: 2
  batch_size: null
  batch_mode: random
  run_name_component: mice_snapshot
  seed: ${seed}
model:
  type: disrnn
  _target_: model_trainers.disrnn_trainer.DisrnnTrainer
  architecture:
    latent_size: 5
    update_net_n_units_per_layer: 16
    update_net_n_layers: 5
    choice_net_n_units_per_layer: 4
    choice_net_n_layers: 0
    activation: leaky_relu
    multisubject: false
    subject_embedding_size: 3
    subject_embedding_init: zeros
    use_global_subject_bottleneck: true
  penalties:
    beta: 5.0e-05
    latent_penalty: ${.beta}
    choice_net_latent_penalty: ${.beta}
    update_net_obs_penalty: ${.beta}
    update_net_latent_penalty: ${.beta}
    subject_penalty: ${.beta}
    update_net_subject_penalty: ${.beta}
    choice_net_subject_penalty: ${.beta}
  training:
    n_steps: 30000
    n_warmup_steps: 3000
    lr: 0.001
    loss: penalized_categorical
    loss_param: 1.0
    max_grad_norm: 1.0
    checkpoint_every_n_steps: 3000
    checkpoint_eval_on_train_split: true
    checkpoint_eval_on_eval_split: true
    checkpoint_log_train_to_wandb: true
    checkpoint_log_eval_to_wandb: true
    checkpoint_plot_split_examples_every_n: 3000
    checkpoint_log_split_examples_to_wandb: true
    checkpoint_run_heldout_eval: true
    checkpoint_include_final_in_heldout: true
    initialization_eval_before_warmup: true
    initialization_eval_after_warmup: true
    plot_choice_rule: false
    plot_update_rules: false
    checkpoint_plot_choice_rule: false
    checkpoint_plot_update_rules: false
    plot_subject_index: 0
    save_output_df: false
    checkpoint_save_output_df_every_n: 0
    checkpoint_keep_media_files: false
  seed: ${seed}
  run_name_component: disrnn_beta${.penalties.beta}_lr${.training.lr}
seed: 85
wandb:
  entity: AIND-disRNN
  dir: /results
  project: mice_train10_test3
  name: ${data.run_name_component}_${model.run_name_component}
  tags: []
job_id: 0
