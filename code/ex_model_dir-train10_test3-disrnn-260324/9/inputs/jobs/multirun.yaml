hydra:
  run:
    dir: /results/${job_id}/
  sweep:
    dir: /results/
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - data=mice_snapshot
    - data.subject_start=0
    - data.subject_end=10
    - data.test_subject_start=10
    - data.test_subject_end=13
    - data.train_example_sessions_per_subject=1
    - data.eval_example_sessions_per_subject=1
    - data.heldout_example_sessions_per_subject=1
    - data.example_max_subjects=3
    - data.mature_only=true
    - data.ignore_policy=exclude
    - data.eval_every_n=2
    - data.batch_size=null
    - data.batch_mode=random
    - data.multisubject=false
    - data.run_name_component=mice_snapshot
    - model=disrnn
    - model.architecture.latent_size=5
    - model.architecture.update_net_n_units_per_layer=16
    - model.architecture.update_net_n_layers=5
    - model.architecture.choice_net_n_units_per_layer=4
    - model.architecture.choice_net_n_layers=0
    - model.architecture.activation=leaky_relu
    - model.architecture.multisubject=false
    - model.penalties.beta=0.003,0.001,0.0005,0.0001,5e-05
    - model.training.n_steps=30000
    - model.training.n_warmup_steps=3000
    - model.training.lr=0.001,0.0005
    - model.training.loss=penalized_categorical
    - model.training.loss_param=1.0
    - model.training.max_grad_norm=1.0
    - model.training.checkpoint_every_n_steps=3000
    - model.training.checkpoint_eval_on_train_split=true
    - model.training.checkpoint_eval_on_eval_split=true
    - model.training.checkpoint_log_train_to_wandb=true
    - model.training.checkpoint_log_eval_to_wandb=true
    - model.training.checkpoint_plot_split_examples_every_n=3000
    - model.training.checkpoint_log_split_examples_to_wandb=true
    - model.training.checkpoint_run_heldout_eval=true
    - model.training.checkpoint_include_final_in_heldout=true
    - model.training.initialization_eval_before_warmup=true
    - model.training.initialization_eval_after_warmup=true
    - model.training.plot_choice_rule=false
    - model.training.plot_update_rules=false
    - model.training.checkpoint_plot_choice_rule=false
    - model.training.checkpoint_plot_update_rules=false
    - model.training.save_output_df=false
    - model.training.checkpoint_save_output_df_every_n=0
    - model.training.checkpoint_keep_media_files=false
    - seed=85
    - wandb.project=mice_train10_test3
  job:
    name: run_capsule
    chdir: true
    override_dirname: data.batch_mode=random,data.batch_size=null,data.eval_every_n=2,data.eval_example_sessions_per_subject=1,data.example_max_subjects=3,data.heldout_example_sessions_per_subject=1,data.ignore_policy=exclude,data.mature_only=true,data.multisubject=false,data.run_name_component=mice_snapshot,data.subject_end=10,data.subject_start=0,data.test_subject_end=13,data.test_subject_start=10,data.train_example_sessions_per_subject=1,data=mice_snapshot,model.architecture.activation=leaky_relu,model.architecture.choice_net_n_layers=0,model.architecture.choice_net_n_units_per_layer=4,model.architecture.latent_size=5,model.architecture.multisubject=false,model.architecture.update_net_n_layers=5,model.architecture.update_net_n_units_per_layer=16,model.penalties.beta=0.003,0.001,0.0005,0.0001,5e-05,model.training.checkpoint_eval_on_eval_split=true,model.training.checkpoint_eval_on_train_split=true,model.training.checkpoint_every_n_steps=3000,model.training.checkpoint_include_final_in_heldout=true,model.training.checkpoint_keep_media_files=false,model.training.checkpoint_log_eval_to_wandb=true,model.training.checkpoint_log_split_examples_to_wandb=true,model.training.checkpoint_log_train_to_wandb=true,model.training.checkpoint_plot_choice_rule=false,model.training.checkpoint_plot_split_examples_every_n=3000,model.training.checkpoint_plot_update_rules=false,model.training.checkpoint_run_heldout_eval=true,model.training.checkpoint_save_output_df_every_n=0,model.training.initialization_eval_after_warmup=true,model.training.initialization_eval_before_warmup=true,model.training.loss=penalized_categorical,model.training.loss_param=1.0,model.training.lr=0.001,0.0005,model.training.max_grad_norm=1.0,model.training.n_steps=30000,model.training.n_warmup_steps=3000,model.training.plot_choice_rule=false,model.training.plot_update_rules=false,model.training.save_output_df=false,model=disrnn,seed=85,wandb.project=mice_train10_test3
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /tmp/nxf.Mw8fDywO6T/capsule/code
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /tmp/nxf.Mw8fDywO6T/capsule/code/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      model: disrnn
      data: mice_snapshot
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
data:
  type: mice_snapshot
  _target_: data_loaders.mice.MiceSnapshotDatasetLoader
  subject_ids: null
  subject_start: 0
  subject_end: 10
  test_subject_ids: null
  test_subject_start: 10
  test_subject_end: 13
  train_example_sessions_per_subject: 1
  eval_example_sessions_per_subject: 1
  heldout_example_sessions_per_subject: 1
  example_max_subjects: 3
  curricula:
  - Uncoupled Without Baiting
  - Uncoupled Baiting
  - Coupled Baiting
  cols_to_retain: null
  mature_only: true
  multisubject: false
  ignore_policy: exclude
  features: null
  eval_every_n: 2
  batch_size: null
  batch_mode: random
  run_name_component: mice_snapshot
  seed: ${seed}
model:
  type: disrnn
  _target_: model_trainers.disrnn_trainer.DisrnnTrainer
  architecture:
    latent_size: 5
    update_net_n_units_per_layer: 16
    update_net_n_layers: 5
    choice_net_n_units_per_layer: 4
    choice_net_n_layers: 0
    activation: leaky_relu
    multisubject: false
    subject_embedding_size: 3
    subject_embedding_init: zeros
    use_global_subject_bottleneck: true
  penalties:
    beta: 0.01
    latent_penalty: ${.beta}
    choice_net_latent_penalty: ${.beta}
    update_net_obs_penalty: ${.beta}
    update_net_latent_penalty: ${.beta}
    subject_penalty: ${.beta}
    update_net_subject_penalty: ${.beta}
    choice_net_subject_penalty: ${.beta}
  training:
    n_steps: 30000
    n_warmup_steps: 3000
    lr: 0.001
    loss: penalized_categorical
    loss_param: 1.0
    max_grad_norm: 1.0
    checkpoint_every_n_steps: 3000
    checkpoint_eval_on_train_split: true
    checkpoint_eval_on_eval_split: true
    checkpoint_log_train_to_wandb: true
    checkpoint_log_eval_to_wandb: true
    checkpoint_plot_split_examples_every_n: 3000
    checkpoint_log_split_examples_to_wandb: true
    checkpoint_run_heldout_eval: true
    checkpoint_include_final_in_heldout: true
    initialization_eval_before_warmup: true
    initialization_eval_after_warmup: true
    plot_choice_rule: false
    plot_update_rules: false
    checkpoint_plot_choice_rule: false
    checkpoint_plot_update_rules: false
    plot_subject_index: 0
    save_output_df: false
    checkpoint_save_output_df_every_n: 0
    checkpoint_keep_media_files: false
  seed: ${seed}
  run_name_component: disrnn_beta${.penalties.beta}_lr${.training.lr}
seed: 85
wandb:
  entity: AIND-disRNN
  dir: /results
  project: mice_train10_test3
  name: ${data.run_name_component}_${model.run_name_component}
  tags: []
job_id: 0
