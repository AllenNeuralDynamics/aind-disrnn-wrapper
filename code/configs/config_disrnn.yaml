# disrnn, multi-subject
model:
  type: disrnn
  _target_: model_trainers.disrnn_trainer.DisrnnTrainer
  architecture:
    multisubject: true
    latent_size: 5
    update_net_n_units_per_layer: 16
    update_net_n_layers: 5
    choice_net_n_units_per_layer: 4
    choice_net_n_layers: 0
    activation: leaky_relu
    subject_embedding_size: 4
    subject_embedding_init: zeros   # zeros | small_random | subject_count_scaled_random
    session_encoding_type: none      # none | scalar | fourier
    session_integration_type: direct # direct | pre_mlp
    session_fourier_k: 4             # used only for fourier
    session_delta_n_layers: 3
    session_delta_hidden_size: 16
    session_n_pretrain_steps: null   # null => resolve to ~30% of warmup + train steps
    session_n_warmup_steps: null     # null => resolve to ~20% of warmup + train steps
    use_global_subject_bottleneck: true
  penalties:
    beta: 0.001
    latent_penalty: ${.beta}
    choice_net_latent_penalty: ${.beta}
    update_net_obs_penalty: ${.beta}
    update_net_latent_penalty_multiplier: 1.0
    update_net_latent_penalty: ${.beta}
    subject_penalty: ${.beta}
    update_net_subject_penalty: ${.beta}
    choice_net_subject_penalty: ${.beta}
  distillation:
    enabled: false
    teacher_model_dirs: []
    temperature: 2.0
    aggregation: mean_probs
    loss: kl
    use_hard_labels: false
    evaluate_against_hard_labels: true
    save_manifest: true
  training:
    n_steps: 20
    n_warmup_steps: 10
    checkpoint_every_n_steps: 10             # 0 disables intermediate checkpoints
    checkpoint_eval_on_eval_split: true        # compute eval-split likelihood at each checkpoint
    checkpoint_eval_on_train_split: true       # compute train-split likelihood at each checkpoint
    checkpoint_log_eval_to_wandb: true         # log checkpoint eval likelihood to W&B
    checkpoint_log_train_to_wandb: true        # log checkpoint train likelihood to W&B
    checkpoint_plot_split_examples_every_n: 10  # 0 disables checkpoint training/eval split example plots
    checkpoint_save_output_df_every_n: 0       # 0 disables per-checkpoint output_df.csv snapshots
    checkpoint_log_split_examples_to_wandb: true # log checkpoint split-example images to W&B
    checkpoint_run_heldout_eval: true          # run held-out test eval for selected checkpoints
    checkpoint_include_final_in_heldout: true # include final step checkpoint in held-out loop
    checkpoint_keep_media_files: false  # false: keep checkpoint visuals in W&B only
    initialization_eval_before_warmup: true   # run/log checkpoint-style eval before warmup
    initialization_eval_after_warmup: true    # run/log checkpoint-style eval after warmup
    plot_choice_rule: false
    plot_update_rules: false
    plot_subject_index: 0   # which subject’s embedding is used for rule plots
    session_conditioning_verbose_logging: true
    plot_session_context_state_space: true
    session_context_plot_max_subjects: 3
    session_context_plot_subject_indices: null
    checkpoint_plot_choice_rule: false
    checkpoint_plot_update_rules: false
    save_output_df: false
    lr: 0.001
    loss: penalized_categorical
    loss_param: 1.0
    lambda_reg_session: 0.0   # 0 disables zero-mean session-delta regularization; try 1.0
    max_grad_norm: 1.0
  seed: ${seed}
  run_name_component: disrnn_beta${.penalties.beta}_lr${.training.lr}


