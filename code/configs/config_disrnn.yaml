####################################################################
# RUN-LEVEL SETTINGS
####################################################################
seed: 36                      # master seed; interpolated into data.seed / subject_sample_seed / model.seed

wandb:
  entity: AIND-disRNN         # W&B team/entity
  dir: /results               # local W&B log directory
  project: test               # W&B project
  name: ${data.run_name_component}_${model.run_name_component}
  # tags: []                  # optional extra W&B tags (data.type + model.type are always added)

job_id: 0                     # informational job identifier for run tracking
