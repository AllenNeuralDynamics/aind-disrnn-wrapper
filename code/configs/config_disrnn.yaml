# =============================================================================
# disRNN model training configuration
# =============================================================================
# Read by run_capsule.py via Hydra/OmegaConf (utils/run_helpers.find_hydra_config
# locates the active config.yaml under /data/jobs). Exactly one `data:` block and
# one `model:` block may be active; the commented blocks are ready-to-use presets.
#
# `${...}` are OmegaConf interpolations resolved at load time:
#   ${seed}                       -> the top-level `seed` below
#   ${.beta}                      -> the sibling `beta` within model.penalties
#   ${.training.lr}               -> a nested sibling key within model
#
# Penalty multipliers: any `<name>_multiplier` under model.penalties scales its
# base `<name>` penalty (defaulting to `beta` if the base is unset) and is then
# removed (utils/run_helpers.resolve_disrnn_penalties, applied before training).
#
# Sections: data (dataset + splitting) · model (architecture + penalties +
#           distillation + training) · seed / wandb / job_id.
# =============================================================================


####################################################################
# DATA
####################################################################
#
# --- Synthetic task-trained RNN preset (uncomment to use) --------------------
# data:
#   type: synthetic_task_trained_rnn
#   _target_: data_loaders.synthetic.TaskTrainedRNNDatasetLoader
#   subject_ids:
#   - combined_block_rw
#   multisubject: false
#   ignore_policy: exclude
#   features:
#     animal_response: prev choice
#     rewarded: prev reward
#   run_name_component: synthetic_task_trained_rnn_${.subject_ids}
#   eval_every_n: 2
#   seed: ${seed}


# --- Single-subject mice (docDB) preset (uncomment to use) -------------------
# data:
#   type: mice
#   _target_: data_loaders.mice.MiceDatasetLoader
#   subject_ids:
#   - 711041
#   multisubject: false
#   ignore_policy: include
#   features:
#     animal_response: prev choice
#     rewarded: prev reward
#   run_name_component: mice_${.subject_ids}
#   eval_every_n: 2
#   seed: ${seed}


# --- Single-subject snapshot preset (uncomment to use) -----------------------
# NOTE: subject_start/subject_end/test_subject_* are NOT valid keys for this
# loader (they are silently ignored). To pin specific subjects, list them in
# `subject_ids`, which bypasses the ratio-based selection pipeline entirely.
# data:
#   type: mice_snapshot
#   _target_: data_loaders.mice.MiceSnapshotDatasetLoader
#   subject_ids: [711041]
#   multisubject: false
#   mature_only: true
#   curricula:
#     - Coupled Baiting
#     - Uncoupled Baiting
#     - Uncoupled Without Baiting
#   ignore_policy: exclude
#   features: null
#   eval_every_n: 2
#   batch_size: null
#   batch_mode: random
#   test_subject_ids: null
#   heldout_example_sessions_per_subject: 1
#   train_example_sessions_per_subject: 1
#   eval_example_sessions_per_subject: 1
#   example_max_subjects: 3
#   run_name_component: mice_snapshot
#   seed: ${seed}


# --- Multi-subject snapshot (ACTIVE) -----------------------------------------
data:
  type: mice_snapshot
  _target_: data_loaders.mice.MiceSnapshotDatasetLoader
  subject_ids: null             # direct override; a non-null list bypasses the selection pipeline below

  # ── Subject selection pipeline ──────────────────────────────────────────
  # Subjects with >= min_sessions sessions are assigned their most-common task
  # as a curriculum and ranked per curriculum by session count. A fixed ~20%
  # held-out test set is reserved (every heldout_every_n-th in rank order) and
  # the training set is a seeded subject_ratio sample of the remaining ~80% pool
  # per curriculum. (See data_loaders.mice.MiceSnapshotDatasetLoader.)
  min_sessions: 10              # int >= 0; minimum all-stage session count to be eligible
  heldout_every_n: 5            # reserve every 5th ranked subject (~20%) as held-out
  subject_ratio:                # per-curriculum fraction of the ~80% train pool; null -> 1.0 each
    Coupled Baiting: 1.0
    Uncoupled Baiting: 1.0
    Uncoupled Without Baiting: 1.0
  subject_sample_seed: ${seed}  # seed for the train-subject sample (held-out set is seed-independent)

  # ── Held-out test-subject evaluation ────────────────────────────────────
  # Auto-enabled for mice_snapshot runs (gated on data.type). To override, add
  # `heldout_eval: false` to disable, or `true` to force on for other run types.
  test_subject_ids: null        # optional explicit held-out subjects (overrides the reserved set)
  heldout_example_sessions_per_subject: 1  # >=0; sessions/subject to plot for held-out (0 skips)
  train_example_sessions_per_subject: 1    # >=0; sessions/subject to plot for the train split (0 skips)
  eval_example_sessions_per_subject: 1     # >=0; sessions/subject to plot for the eval split (0 skips)
  example_max_subjects: 3                  # >=0; cap on subjects used for train/eval/held-out example plots

  # ── Trial / feature processing ──────────────────────────────────────────
  mature_only: true             # return only mature-stage trials (STAGE_FINAL/GRADUATED); does NOT affect selection
  curricula:                    # task names to include in selection (and held-out eval)
    - Coupled Baiting
    - Uncoupled Baiting
    - Uncoupled Without Baiting
  ignore_policy: exclude        # exclude: drop no-response trials (2 classes) | include: keep them (3 classes)
  features: null                # null -> library defaults (prev choice, prev reward); or {col: feature} mapping
  # cols_to_retain: null        # optional list[str] of trial columns to keep; null -> module default

  # ── Batching / splitting ────────────────────────────────────────────────
  eval_every_n: 2               # every Nth session -> eval split (applied per-subject in multisubject mode)
  batch_size: null              # null -> one batch of all episodes
  batch_mode: random            # single | rolling | random
  multisubject: true            # true -> per-subject datasets merged with subject_index prepended as feature 0

  # ── Run identity ────────────────────────────────────────────────────────
  run_name_component: mice_snapshot  # W&B name component; "_multisubject" is auto-appended when multisubject=true
  seed: ${seed}


####################################################################
# MODEL
####################################################################
#
# --- Single-subject disRNN preset (uncomment to use) -------------------------
# model:
#   type: disrnn
#   _target_: model_trainers.disrnn_trainer.DisrnnTrainer
#   architecture:
#     multisubject: false
#     latent_size: 5
#     update_net_n_units_per_layer: 16
#     update_net_n_layers: 5
#     choice_net_n_units_per_layer: 4
#     choice_net_n_layers: 1
#     activation: leaky_relu
#   penalties:
#     beta: 0.001
#     latent_penalty: ${.beta}
#     choice_net_latent_penalty: ${.beta}
#     update_net_obs_penalty: ${.beta}
#     update_net_latent_penalty_multiplier: 1.0
#     update_net_latent_penalty: ${.beta}
#   training:
#     n_steps: 20
#     n_warmup_steps: 10
#     lr: 0.001
#     loss: penalized_categorical
#     loss_param: 1.0
#     max_grad_norm: 1.0
#     checkpoint_every_n_steps: 10
#     checkpoint_eval_on_eval_split: true
#     checkpoint_eval_on_train_split: true
#     checkpoint_log_eval_to_wandb: true
#     checkpoint_log_train_to_wandb: true
#     checkpoint_plot_split_examples_every_n: 10
#     checkpoint_save_output_df_every_n: 0
#     checkpoint_log_split_examples_to_wandb: true
#     checkpoint_run_heldout_eval: true
#     checkpoint_include_final_in_heldout: true
#     checkpoint_keep_media_files: false
#     initialization_eval_before_warmup: true
#     initialization_eval_after_warmup: true
#     plot_choice_rule: false
#     plot_update_rules: false
#     checkpoint_plot_choice_rule: false
#     checkpoint_plot_update_rules: false
#     save_output_df: false
#   seed: ${seed}
#   run_name_component: disrnn_beta${.penalties.beta}_lr${.training.lr}


# --- Multi-subject disRNN (ACTIVE) -------------------------------------------
model:
  type: disrnn
  _target_: model_trainers.disrnn_trainer.DisrnnTrainer

  architecture:
    # ── Core disRNN networks ────────────────────────────────────────────────
    multisubject: true                  # enable per-subject embeddings (requires multisubject data)
    latent_size: 5                      # int > 0; number of (bottlenecked) latent state dimensions
    update_net_n_units_per_layer: 16    # int > 0; width of the per-latent update MLP
    update_net_n_layers: 5              # int > 0; depth of the update MLP
    choice_net_n_units_per_layer: 4     # int > 0; width of the choice (readout) MLP
    choice_net_n_layers: 0              # int >= 0; depth of the choice MLP (0 -> linear readout)
    activation: leaky_relu              # MLP activation (e.g. leaky_relu, relu, tanh)

    # ── Per-subject embedding (multisubject only) ───────────────────────────
    subject_embedding_size: 4           # int > 0; dimensionality of the learned per-subject embedding
    subject_embedding_init: zeros       # zeros | small_random | subject_count_scaled_random
    use_global_subject_bottleneck: true # apply an information bottleneck to the subject embedding

    # ── Session conditioning (multisubject only) ────────────────────────────
    # Learned, session-indexed perturbation on each subject embedding.
    # Disabled when session_encoding_type == none.
    session_encoding_type: none      # none | scalar | fourier
    session_integration_type: direct # direct | pre_mlp
    session_fourier_k: 4             # int > 0; Fourier basis pairs (used only when encoding_type == fourier)
    session_delta_n_layers: 3        # int > 0; depth of the session-delta MLP
    session_delta_hidden_size: 16    # int > 0; width of the session-delta MLP

    # ── Session-conditioning curriculum (steps; resolved against warmup + n_steps) ──
    session_n_pretrain_steps: null   # int >=0 or null; null => ~30% of (n_warmup_steps + n_steps)
    session_n_warmup_steps: null     # int >=0 or null; null => ~20% of (n_warmup_steps + n_steps)

  penalties:
    # KL information-bottleneck penalties. `beta` is the base scale and the
    # default for any penalty left unset. Each `<name>_multiplier` scales its
    # base `<name>` (default beta) and is removed before training.
    beta: 0.001
    latent_penalty: ${.beta}                    # bottleneck on the latent state
    choice_net_latent_penalty: ${.beta}         # bottleneck on latents feeding the choice net
    update_net_obs_penalty: ${.beta}            # bottleneck on observations feeding the update net
    update_net_latent_penalty_multiplier: 1.0   # scales update_net_latent_penalty (resolved pre-training)
    update_net_latent_penalty: ${.beta}         # bottleneck on latents feeding the update net
    # ── Subject-embedding bottleneck penalties (multisubject only) ──────────
    subject_penalty: ${.beta}                   # bottleneck on the global subject embedding
    update_net_subject_penalty: ${.beta}        # bottleneck on subject context in the update net
    choice_net_subject_penalty: ${.beta}        # bottleneck on subject context in the choice net

  distillation:
    # Optional GRU -> disRNN knowledge distillation. When enabled, the student
    # disRNN is trained toward the (temperature-softened) mean of teacher GRU
    # probabilities. v1 supports aggregation=mean_probs and loss=kl only.
    enabled: false
    teacher_model_dirs: []          # list of trained GRU run dirs; >=1 required when enabled
    temperature: 2.0                # float > 0; softens teacher probabilities
    aggregation: mean_probs         # mean_probs (only mode supported)
    loss: kl                        # kl (only mode supported)
    use_hard_labels: false          # must stay false in v1 (true raises ValueError)
    evaluate_against_hard_labels: true  # also report likelihood against ground-truth hard labels
    save_manifest: true             # write a teacher-ensemble manifest for reproducibility

  training:
    # ── Optimization ────────────────────────────────────────────────────────
    n_steps: 20               # int > 0; full training steps (after warmup)
    n_warmup_steps: 10        # int >= 0; warmup steps before penalties ramp to full strength
    lr: 0.001                 # Adam learning rate
    loss: penalized_categorical  # categorical | penalized_categorical (adds the bottleneck penalty term)
    loss_param: 1.0           # penalty scale for penalized_categorical
    max_grad_norm: 1.0        # gradient-norm clip threshold (0 disables)

    # ── Session-delta regularization (multisubject + session conditioning) ──
    lambda_reg_session: 0.0   # >=0; 0 disables zero-mean session-delta regularization; try 1.0

    # ── Checkpoint cadence ──────────────────────────────────────────────────
    checkpoint_every_n_steps: 10           # int >= 0; 0 disables intermediate checkpoints

    # ── Per-checkpoint likelihood eval + W&B logging ────────────────────────
    checkpoint_eval_on_eval_split: true    # compute eval-split likelihood at each checkpoint
    checkpoint_eval_on_train_split: true   # compute train-split likelihood at each checkpoint
    checkpoint_log_eval_to_wandb: true     # log checkpoint eval likelihood to W&B
    checkpoint_log_train_to_wandb: true    # log checkpoint train likelihood to W&B

    # ── Per-checkpoint plotting / media ─────────────────────────────────────
    checkpoint_plot_split_examples_every_n: 10  # int >= 0; 0 disables checkpoint split-example plots
    checkpoint_save_output_df_every_n: 0        # int >= 0; 0 disables per-checkpoint output_df.csv snapshots
    checkpoint_log_split_examples_to_wandb: true # log checkpoint split-example images to W&B
    checkpoint_keep_media_files: false          # false: log media to W&B only, then delete local files
    checkpoint_plot_choice_rule: false          # plot choice rule at checkpoints (expensive)
    checkpoint_plot_update_rules: false         # plot update rules at checkpoints (expensive)

    # ── Per-checkpoint held-out eval (needs held-out eval enabled in data) ──
    checkpoint_run_heldout_eval: true        # run held-out test eval at selected checkpoints
    checkpoint_include_final_in_heldout: true # include the final-step checkpoint in the held-out loop

    # ── Initialization eval ─────────────────────────────────────────────────
    initialization_eval_before_warmup: true  # run/log a checkpoint-style eval at random init
    initialization_eval_after_warmup: true   # run/log a checkpoint-style eval after warmup completes

    # ── Final disRNN rule plots ───────────────────────────────────────────────
    plot_choice_rule: false   # plot the final choice rule
    plot_update_rules: false  # plot the final per-latent update rules
    plot_subject_index: 0     # int in [0, num_subjects); which subject's embedding drives rule plots

    # ── Session-context logging / state-space plots (multisubject only) ─────
    session_conditioning_verbose_logging: true  # log session-conditioning curriculum + counts
    plot_session_context_state_space: true       # plot session-conditioned embedding trajectories
    session_context_plot_max_subjects: 3          # >=0; cap subjects in session-context plots
    session_context_plot_subject_indices: null    # list[int] or null (null -> random sample, seeded)

    # ── Final outputs ────────────────────────────────────────────────────────
    save_output_df: false     # save final per-trial predictions to output_df.csv

    # ── Automatic held-out fine-tuning + evaluation (multisubject only) ──────
    # After training, fine-tune a fresh embedding for each reserved held-out
    # subject (rest of the model frozen) and log aggregate held-out train/eval
    # split likelihood to the SAME W&B run under a `heldout/` namespace (mirrors
    # checkpoint/train_likelihood & checkpoint/eval_likelihood for training
    # subjects). Ignored for single-subject or non-gru/disrnn runs.
    auto_heldout_finetune:
      enabled: true                # set false to skip; ignored unless multisubject gru/disrnn
      checkpoint_policy: final     # final | best_eval | best_heldout (source params to expand)
      n_steps: 50                  # fine-tune steps for the new held-out embedding rows
      lr: 1e-2                     # Adam lr for the held-out embedding fine-tune
      checkpoint_every_n_steps: 0  # 0 -> evaluate at init + final only
      batch_size: null             # null -> inherit the source run's data batch_size
      batch_mode: single           # single | rolling | random
      keep_media_files: true
      checkpoint_plot_split_examples_every_n: 0  # 0 disables checkpoint split-example plots
      checkpoint_save_output_df_every_n: 0       # 0 disables per-checkpoint output_df.csv
      train_example_sessions_per_subject: 1
      eval_example_sessions_per_subject: 1
      example_max_subjects: 6
      output_root: /results/heldout_subject_finetuning
      run_name_suffix: null

  seed: ${seed}
  run_name_component: disrnn_beta${.penalties.beta}_lr${.training.lr}


