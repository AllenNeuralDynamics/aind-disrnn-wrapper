source_run:
  model_dir: /path/to/trained/model_run
  checkpoint_policy: best_eval

# Held-out subject selection. Leave fields null to inherit the reserved heldout
# set from the source training run's config (the every-Nth subjects per curriculum).
heldout_subjects:
  test_subject_ids: null    # optional explicit heldout subjects (overrides reserved set)
  curricula: null           # null → inherit from source run
  min_sessions: null        # null → inherit from source run (default 10)
  heldout_every_n: null     # null → inherit from source run (default 5)
  mature_only: null         # null → inherit from source run
  cols_to_retain: null

heldout_finetuning:
  n_steps: 50
  lr: 1e-2
  checkpoint_every_n_steps: 10
  batch_size: null
  batch_mode: single
  checkpoint_plot_split_examples_every_n: 10
  checkpoint_save_output_df_every_n: 0
  train_example_sessions_per_subject: 1
  eval_example_sessions_per_subject: 1
  example_max_subjects: 6
  skip_subjects_with_insufficient_sessions: true
  keep_media_files: true

output:
  output_root: /results/heldout_subject_finetuning
  run_name_suffix: null

wandb: {}

seed: null
