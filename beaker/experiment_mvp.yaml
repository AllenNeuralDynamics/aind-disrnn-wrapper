## Beaker experiment spec — disRNN MVP (one W&B sweep agent on one GPU).
##
## Fill the three <PLACEHOLDERS> before submitting:
##   <username>/disrnn-wrapper   image ref printed by `beaker image get` (NOT the ai1/<ws> path)
##   <SWEEP_ID>                  e.g. AIND-disRNN/beaker_mvp/abc123 (from `wandb sweep`)
##   <prefix>-wandb-api-key      Beaker secret name holding your W&B key
##
## Submit:
##   beaker experiment create -w ai1/aind-dynamic-foraging-foundation-model beaker/experiment_mvp.yaml
##
## Scale up later by bumping `replicas` (N agents across N GPUs) and/or running
## beaker/pack_gpu.sh as the command (M agents packed on each GPU).

version: v2
description: disRNN MVP — synthetic-RL -> disRNN (default), one W&B sweep agent
tasks:
  - name: disrnn-mvp
    image:
      # Beaker's own registry (built in CO via `beaker image create`).
      beaker: <username>/disrnn-wrapper
      # Alternative — external registry (only if built without the beaker CLI):
      #   docker: ghcr.io/AllenNeuralDynamics/disrnn-wrapper:latest
      #   (private ghcr images need pull credentials configured in the workspace)
    # postInstall pulls the latest code from GitHub at container startup, THEN
    # runs `wandb agent` — so code/config edits need no image rebuild (see
    # beaker/postInstall and the README "Active development" note). Refs are set
    # via WRAPPER_REF / DISPATCHER_REF below.
    command: [bash, /workspace/aind-disrnn-wrapper/beaker/postInstall, wandb, agent, --count, "1", "<SWEEP_ID>"]
    replicas: 1
    context:
      priority: low
      preemptible: true
    constraints:
      cluster:
        - ai1/octo-hub-aws-l40s      # smallest GPU class (L40s)
    resources:
      gpuCount: 1
    envVars:
      - name: WANDB_API_KEY
        secret: <prefix>-wandb-api-key
      - name: DISRNN_OUTPUT_DIR
        value: /results
      - name: WRAPPER_REF         # branch/tag/SHA to run; SHA pins for reproducibility
        value: ai_hub
      - name: DISPATCHER_REF
        value: ai_hub
    result:
      path: /results
